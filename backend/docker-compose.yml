version: '3.8'

services:
  # Infrastructure
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # Core Services
  service-registry:
    build: ./service-registry
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      
  config-server:
    build: ./config-server
    ports:
      - "8888:8888"
    depends_on:
      - service-registry
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - service-registry
      - config-server
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/

  # Business Services
  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    depends_on:
      - service-registry
      - config-server
      - postgres
      - redis
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/auth_db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  user-service:
    build: ./user-service
    ports:
      - "8082:8082"
    depends_on:
      - service-registry
      - config-server
      - postgres
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/user_db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  truck-service:
    build: ./truck-service
    ports:
      - "8083:8083"
    depends_on:
      - service-registry
      - postgres
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/truck_db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  shipment-service:
    build: ./shipment-service
    ports:
      - "8084:8084"
    depends_on:
      - service-registry
      - postgres
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/shipment_db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  matching-service:
    build: ./matching-service
    ports:
      - "8085:8085"
    depends_on:
      - service-registry
      - postgres
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/matching_db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  tracking-service:
    build: ./tracking-service
    ports:
      - "8086:8086"
    depends_on:
      - service-registry
      - postgres
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/tracking_db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  notification-service:
    build: ./notification-service
    ports:
      - "8087:8087"
    depends_on:
      - service-registry
      - postgres
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/notification_db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  review-service:
    build: ./review-service
    ports:
      - "8088:8088"
    depends_on:
      - service-registry
      - postgres
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/review_db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  analytics-service:
    build: ./analytics-service
    ports:
      - "8089:8089"
    depends_on:
      - service-registry
      - postgres
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/analytics_db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  admin-service:
    build: ./admin-service
    ports:
      - "8090:8090"
    depends_on:
      - service-registry
      - postgres
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/admin_db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

volumes:
  postgres_data:
  redis_data:
